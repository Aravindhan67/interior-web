<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - LuxeSpace Interiors</title>
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .portfolio-filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
        }
        .filter-btn {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--text-color);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary-color);
            color: #fff;
        }
        .portfolio-grid {
            column-count: 3;
            column-gap: 20px;
        }
        @media (max-width: 992px) {
            .portfolio-grid { column-count: 2; }
        }
        @media (max-width: 576px) {
            .portfolio-grid { column-count: 1; }
        }
        .portfolio-item {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
        }
        .portfolio-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }
        .portfolio-item:hover img {
            transform: scale(1.1);
        }
        .portfolio-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(27, 27, 27, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: #fff;
        }
        .portfolio-item:hover .portfolio-overlay {
            opacity: 1;
        }
        
        /* Lightbox */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        #lightbox.active {
            opacity: 1;
            visibility: visible;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 5px;
        }
        #lightbox-close {
            position: absolute;
            top: 20px; right: 30px;
            color: #fff;
            font-size: 3rem;
            cursor: pointer;
            transition: 0.3s;
        }
        #lightbox-close:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div class="preloader"><div class="loader"></div></div>

    <!-- Scroll Progress -->
    <div class="scroll-progress"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-couch"></i> LuxeSpace
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="portfolio.html" class="active">Portfolio</a>
                <a href="projects.html">Projects</a>
                <a href="testimonials.html">Testimonials</a>
                <a href="blog.html">Blog</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="nav-controls">
                <button class="theme-toggle">🌙</button>
                <button class="mobile-menu-btn">☰</button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header animate-fade-in" style="background-image: linear-gradient(rgba(27, 27, 27, 0.7), rgba(27, 27, 27, 0.7)), url('https://images.unsplash.com/photo-1556912172-45b7abe8b7e1?auto=format&fit=crop&q=80&w=1920');">
        <div class="container">
            <h1 class="animate-slide-up">Our Portfolio</h1>
            <div class="breadcrumb animate-slide-up" style="transition-delay: 0.1s;">
                <a href="index.html">Home</a> <span>/</span> <span>Portfolio</span>
            </div>
        </div>
    </header>

    <!-- Portfolio Section -->
    <section class="portfolio section-padding">
        <div class="container">
            <div class="portfolio-filters reveal animate-slide-up">

                <button class="filter-btn" data-filter="living">Living Room</button>
                <button class="filter-btn" data-filter="kitchen">Kitchen</button>
                <button class="filter-btn" data-filter="bedroom">Bedroom</button>
                <button class="filter-btn" data-filter="office">Office</button>
            </div>

            <div class="portfolio-grid">
                <!-- Item 1 -->
                <div class="portfolio-item reveal animate-zoom-in" data-category="living">
                    <img src="https://images.unsplash.com/photo-1600210491892-03d54c0aaf87?auto=format&fit=crop&q=80&w=600" alt="Living Room">
                    <div class="portfolio-overlay">
                        <h3>Modern Living</h3>
                        <p><i class="fas fa-search-plus"></i></p>
                    </div>
                </div>
                <!-- Item 2 -->
                <div class="portfolio-item reveal animate-zoom-in" data-category="kitchen">
                    <img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&q=80&w=600" alt="Kitchen">
                    <div class="portfolio-overlay">
                        <h3>Modular Kitchen</h3>
                        <p><i class="fas fa-search-plus"></i></p>
                    </div>
                </div>
                <!-- Item 3 -->
                <div class="portfolio-item reveal animate-zoom-in" data-category="bedroom">
                    <img src="https://images.unsplash.com/photo-1616594039964-ae9021a400a0?auto=format&fit=crop&q=80&w=600" alt="Bedroom">
                    <div class="portfolio-overlay">
                        <h3>Luxury Bedroom</h3>
                        <p><i class="fas fa-search-plus"></i></p>
                    </div>
                </div>
                <!-- Item 4 -->
                <div class="portfolio-item reveal animate-zoom-in" data-category="office">
                    <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=600" alt="Office">
                    <div class="portfolio-overlay">
                        <h3>Corporate Office</h3>
                        <p><i class="fas fa-search-plus"></i></p>
                    </div>
                </div>
                <!-- Item 5 -->
                <div class="portfolio-item reveal animate-zoom-in" data-category="living">
                    <img src="https://images.unsplash.com/photo-1583847268964-b28ce8f31586?auto=format&fit=crop&q=80&w=600" alt="Living Room">
                    <div class="portfolio-overlay">
                        <h3>Classic Living</h3>
                        <p><i class="fas fa-search-plus"></i></p>
                    </div>
                </div>
                <!-- Item 6 -->
                <div class="portfolio-item reveal animate-zoom-in" data-category="kitchen">
                    <img src="https://images.unsplash.com/photo-1588854337236-6889d631faa8?auto=format&fit=crop&q=80&w=600" alt="Kitchen">
                    <div class="portfolio-overlay">
                        <h3>Minimalist Kitchen</h3>
                        <p><i class="fas fa-search-plus"></i></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Include -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom"><p>&copy; 2026 LuxeSpace Interiors.</p></div>
        </div>
    </footer>

    <!-- Back to top button -->
    <button class="back-to-top"><i class="fas fa-arrow-up"></i></button>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/portfolio.js"></script>
</body>
</html>
